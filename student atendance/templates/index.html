<!DOCTYPE html>
<html>
<head>
<title>Student Management System</title>

<style>
body {
    margin:0;
    font-family: Arial;
}

/* Navbar */
.navbar {
    background:#1e1e2f;
    color:white;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

.navbar a {
    color:white;
    text-decoration:none;
    margin-left:15px;
}

/* Hero Section */
.hero {
    height:90vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:linear-gradient(to right,#4facfe,#00f2fe);
    color:white;
}

.hero h1 {
    font-size:40px;
}

.hero button {
    padding:12px 20px;
    border:none;
    background:#1e1e2f;
    color:white;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="navbar">
    <h2>SIMS</h2>
    <div>
        <a href="/">Home</a>
        <a href="/login">Login</a>
        <a href="/register">Register</a>
    </div>
</div>

<div class="hero">
    <h1>Student Information Management System</h1>
    <p>Manage student data easily</p>
    <button onclick="goLogin()">Get Started</button>
</div>

<script>
function goLogin(){
    window.location.href="/login";
}
</script>

</body>
</html>
